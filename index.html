011, 41.003906], [-105.728954, 40.998429], [-107.919731, 41.003906], [-109.04798, 40.998429], [-111.047063, 40.998429], [-111.047063, 42.000709], [-111.047063, 44.476286], [-111.05254, 45.002073], [-109.080842, 45.002073]]]}}]};
const MAX_POP = 2200;

// Top 20 precomputado
const TOP20 = [...FACILITIES]
  .sort((a,b) => parseFloat(b.promedio_diario)-parseFloat(a.promedio_diario))
  .slice(0,20);
const TOP20_CODES = new Set(TOP20.map(d=>d.detention_facility_code));

let mode = 'todas';
let showEstados = false;
let showTop20Panel = false;
let minVal = 0;
let circles = [];
let choroplethLayer = null;
let highlightCircle = null;

const map = L.map('map', {center:[38.5,-97],zoom:4,preferCanvas:true});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom:19
}).addTo(map);

// ── HELPERS ──────────────────────────────────────────────
function getRadius(val, isTop20) {
  if (val<=0) return 3;
  const r = Math.max(4, Math.sqrt(val/MAX_POP)*46);
  return isTop20 ? r : r;
}

function getChoroplethColor(val) {
  if (val>=10000) return '#67000d';
  if (val>=5000)  return '#a50f15';
  if (val>=2000)  return '#cb181d';
  if (val>=1000)  return '#ef3b2c';
  if (val>=500)   return '#fb6a4a';
  if (val>=200)   return '#fc9272';
  if (val>=50)    return '#fcbba1';
  if (val>0)      return '#fee5d9';
  return '#f0f0f0';
}

function makePopup(d, rank) {
  const val = parseFloat(d.promedio_diario);
  const isReac = d.reactivada;
  const isT = TOP20_CODES.has(d.detention_facility_code);
  let tags = '';
  if (isT) tags += `<span class="pop-tag tag-top20">★ Top ${rank || TOP20.findIndex(x=>x.detention_facility_code===d.detention_facility_code)+1}</span> `;
  if (isReac) tags += `<span class="pop-tag tag-trump">Reactivada por Trump</span>`;
  else tags += `<span class="pop-tag tag-prev">Instalación preexistente</span>`;
  return `<div class="pop-name">${d.name}</div>
    <div>${tags}</div>
    <div class="pop-loc" style="margin-top:5px">${d.city}, condado ${d.county} · ${d.state}</div>
    <div class="pop-grid">
      <div class="pop-stat"><div class="pop-stat-label">Promedio diario</div><div class="pop-stat-val">${Math.round(val).toLocaleString()}</div></div>
      <div class="pop-stat"><div class="pop-stat-label">Pico máximo</div><div class="pop-stat-val">${parseInt(d.maximo).toLocaleString()}</div></div>
    </div>`;
}

// ── CÍRCULOS ──────────────────────────────────────────────
const circleMap = {};  // code -> circle

function renderCircles() {
  circles.forEach(c => map.removeLayer(c));
  circles = [];
  Object.keys(circleMap).forEach(k => delete circleMap[k]);

  const filtered = FACILITIES.filter(d => {
    const val = parseFloat(d.promedio_diario);
    if (val < minVal) return false;
    if (mode==='reactivadas' && !d.reactivada) return false;
    return true;
  }).sort((a,b) => parseFloat(a.promedio_diario)-parseFloat(b.promedio_diario));

  document.getElementById('badge').textContent = filtered.length + ' instalaciones';

  filtered.forEach(d => {
    const val = parseFloat(d.promedio_diario);
    const isReac = d.reactivada;
    const isTop = TOP20_CODES.has(d.detention_facility_code);
    const r = Math.max(4, Math.sqrt(val/MAX_POP)*46);

    let fillColor = '#c0392b';
    let strokeColor = isReac ? '#7b0000' : '#c0392b';
    let strokeWidth = isReac ? 2 : 0.8;
    let fillOp = isReac ? 0.75 : 0.45;

    if (isTop) {
      strokeColor = '#b7860b';
      strokeWidth = 2.5;
      fillOp = Math.max(fillOp, 0.65);
    }

    const circle = L.circleMarker([parseFloat(d.latitude),parseFloat(d.longitude)], {
      radius: r, fillColor, color: strokeColor,
      weight: strokeWidth, opacity:1, fillOpacity: fillOp
    });
    circle.bindPopup(makePopup(d), {maxWidth:300});
    circle.addTo(map);
    circles.push(circle);
    circleMap[d.detention_facility_code] = circle;
  });
}

// ── COROPLÉTICO ──────────────────────────────────────────────
function renderChoropleth() {
  if (choroplethLayer) { map.removeLayer(choroplethLayer); choroplethLayer=null; }
  if (!showEstados) return;
  choroplethLayer = L.geoJSON(GEOJSON, {
    style: f => ({
      fillColor: getChoroplethColor(f.properties.promedio||0),
      weight:1, opacity:1, color:'#555', fillOpacity:0.75
    }),
    onEachFeature: (feature, layer) => {
      const p = feature.properties;
      layer.bindPopup(`<div class="pop-name">${p.name} (${p.abbr||''})</div>
        <div class="pop-loc">${p.n_inst||0} instalaciones activas</div>
        <div class="pop-grid">
          <div class="pop-stat"><div class="pop-stat-label">Promedio diario</div><div class="pop-stat-val">${(p.promedio||0).toLocaleString()}</div></div>
          <div class="pop-stat"><div class="pop-stat-label">Pico máximo</div><div class="pop-stat-val">${(p.maximo||0).toLocaleString()}</div></div>
        </div>`, {maxWidth:240});
      layer.on('mouseover', function() { this.setStyle({weight:2,color:'#222'}); });
      layer.on('mouseout', function() { choroplethLayer.resetStyle(this); });
    }
  }).addTo(map);
}

// ── MODOS ──────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('btn-todas').className = m==='todas' ? 'btn active' : 'btn';
  document.getElementById('btn-reactivadas').className = m==='reactivadas' ? 'btn active' : 'btn';
  if (!showEstados) renderCircles();
  updateLegend();
}

function toggleEstados() {
  showEstados = !showEstados;
  const btn = document.getElementById('btn-estados');
  const fw = document.getElementById('filter-wrap');
  if (showEstados) {
    btn.className = 'btn active-blue';
    fw.style.opacity='0.3';
    circles.forEach(c => map.removeLayer(c));
    renderChoropleth();
    document.getElementById('badge').textContent = '50 estados';
  } else {
    btn.className = 'btn';
    fw.style.opacity='1';
    if (choroplethLayer) { map.removeLayer(choroplethLayer); choroplethLayer=null; }
    renderCircles();
  }
  updateLegend();
}

function updateMin(val) {
  minVal = parseInt(val);
  document.getElementById('min-label').textContent = val;
  if (!showEstados) renderCircles();
}

// ── TOP 20 ──────────────────────────────────────────────
function buildTop20List() {
  const list = document.getElementById('top20-list');
  list.innerHTML = '';
  TOP20.forEach((d,i) => {
    const val = Math.round(parseFloat(d.promedio_diario));
    const div = document.createElement('div');
    div.className = 't20-item';
    div.innerHTML = `
      <div class="t20-rank">#${i+1}</div>
      <div class="t20-info">
        <div class="t20-name" title="${d.name}">${d.name}</div>
        <div class="t20-sub">${d.city}, ${d.state}${d.reactivada ? ' · <span style="color:#c0392b">Trump</span>' : ''}</div>
      </div>
      <div class="t20-val">${val.toLocaleString()}</div>`;
    div.onclick = () => flyToFacility(d);
    list.appendChild(div);
  });
}

function toggleTop20() {
  showTop20Panel = !showTop20Panel;
  document.getElementById('top20-panel').style.display = showTop20Panel ? 'block' : 'none';
  document.getElementById('btn-top20').className = showTop20Panel ? 'btn active-gold' : 'btn';
  if (showTop20Panel) buildTop20List();
}

function flyToFacility(d) {
  const lat = parseFloat(d.latitude);
  const lng = parseFloat(d.longitude);
  map.flyTo([lat, lng], 8, {duration:1.2});
  setTimeout(() => {
    if (showEstados) {
      showEstados = false;
      document.getElementById('btn-estados').className = 'btn';
      document.getElementById('filter-wrap').style.opacity='1';
      if (choroplethLayer) { map.removeLayer(choroplethLayer); choroplethLayer=null; }
      renderCircles();
    }
    const circle = circleMap[d.detention_facility_code];
    if (circle) {
      circle.openPopup();
      circle.setStyle({color:'#b7860b', weight:3});
      setTimeout(() => circle.setStyle({
        color: d.reactivada ? '#7b0000' : '#c0392b',
        weight: d.reactivada ? 2 : 0.8
      }), 2500);
    }
  }, 1300);
}

// ── BUSCADOR ──────────────────────────────────────────────
let searchIndex = 0;
let searchResults = [];

function onSearch(q) {
  const clear = document.getElementById('search-clear');
  const box = document.getElementById('search-results');
  q = q.trim();
  clear.style.display = q ? 'block' : 'none';
  if (q.length < 2) { box.style.display='none'; return; }

  const ql = q.toLowerCase();
  searchResults = FACILITIES.filter(d =>
    d.name.toLowerCase().includes(ql) ||
    d.city.toLowerCase().includes(ql) ||
    d.state.toLowerCase().includes(ql) ||
    d.county.toLowerCase().includes(ql)
  ).sort((a,b) => parseFloat(b.promedio_diario)-parseFloat(a.promedio_diario)).slice(0,8);

  if (!searchResults.length) {
    box.innerHTML = '<div class="sr-empty">Sin resultados</div>';
    box.style.display = 'block';
    return;
  }

  box.innerHTML = searchResults.map((d,i) => {
    const val = Math.round(parseFloat(d.promedio_diario));
    const reacBadge = d.reactivada ? '<span class="sr-badge sr-trump">Trump</span>' : '';
    const rank = TOP20.findIndex(x=>x.detention_facility_code===d.detention_facility_code);
    const rankBadge = rank>=0 ? `<span class="sr-badge" style="background:#fdf3dc;color:#b7860b;border:1px solid #f0d88a">Top ${rank+1}</span>` : '';
    return `<div class="sr-item" onclick="selectResult(${i})">
      <div class="sr-name">${d.name}${reacBadge}${rankBadge}</div>
      <div class="sr-sub">${d.city}, ${d.county} Co. · ${d.state} · ${val.toLocaleString()} pers/noche</div>
    </div>`;
  }).join('');
  box.style.display = 'block';
}

function selectResult(i) {
  const d = searchResults[i];
  document.getElementById('search-input').value = d.name;
  document.getElementById('search-results').style.display = 'none';
  document.getElementById('search-clear').style.display = 'block';
  flyToFacility(d);
}

function onSearchKey(e) {
  if (e.key==='Escape') clearSearch();
  if (e.key==='Enter' && searchResults.length) selectResult(0);
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').style.display = 'none';
  document.getElementById('search-clear').style.display = 'none';
  searchResults = [];
}

document.addEventListener('click', e => {
  if (!document.getElementById('search-wrap').contains(e.target)) {
    document.getElementById('search-results').style.display = 'none';
  }
});

// ── LEYENDA ──────────────────────────────────────────────
const legendControl = L.control({position:'bottomright'});
legendControl.onAdd = function() { this._div = L.DomUtil.create('div'); this.update(); return this._div; };
legendControl.update = function() {

      <div class="leg-row"><div style="width:14px;height:14px;background:#67000d;border:1px solid #333"></div> +10,000</div>
      <div class="leg-row"><div style="width:14px;height:14px;background:#a50f15;border:1px solid #333"></div> 5,000–9,999</div>
      <div class="leg-row"><div style="width:14px;height:14px;background:#cb181d;border:1px solid #333"></div> 2,000–4,999</div>
      <div class="leg-row"><div style="width:14px;height:14px;background:#ef3b2c;border:1px solid #333"></div> 1,000–1,999</div>
      <div class="leg-row"><div style="width:14px;height:14px;background:#fb6a4a;border:1px solid #333"></div> 500–999</div>
      <div class="leg-row"><div style="width:14px;height:14px;background:#fcbba1;border:1px solid #333"></div> 50–499</div>
      <div class="leg-row"><div style="width:14px;height:14px;background:#f0f0f0;border:1px solid #ccc"></div> Menos de 50</div>
    </div>`;
  } else {
    this._div.innerHTML = `<div class="legend-box">
      <h4>Promedio diario</h4>
      <div class="leg-row"><div class="leg-circle" style="width:26px;height:26px;"></div> +1,000 personas</div>
      <div class="leg-row"><div class="leg-circle" style="width:18px;height:18px;"></div> 500–999</div>
      <div class="leg-row"><div class="leg-circle" style="width:12px;height:12px;"></div> 200–499</div>
      <div class="leg-row"><div class="leg-circle" style="width:7px;height:7px;"></div> 50–199</div>
      <div class="leg-row"><div class="leg-circle" style="width:4px;height:4px;opacity:0.5"></div> Menos de 50</div>
      <div style="margin-top:8px;padding-top:8px;border-top:1px solid #eee">
        <div class="leg-row"><div style="width:10px;height:10px;border-radius:50%;background:rgba(192,57,43,0.75);border:2px solid #7b0000"></div><span style="font-size:0.68rem"> Reactivada por Trump</span></div>
        <div class="leg-row"><div style="width:10px;height:10px;border-radius:50%;background:rgba(192,57,43,0.45);border:1px solid #c0392b"></div><span style="font-size:0.68rem"> Preexistente</span></div>
        <div class="leg-row"><div style="width:10px;height:10px;border-radius:50%;background:rgba(192,57,43,0.65);border:2.5px solid #b7860b"></div><span style="font-size:0.68rem"> Top 20</span></div>
      </div>
    </div>`;
  }
};
legendControl.addTo(map);
function updateLegend() { legendControl.update(); }

// ── INIT ──────────────────────────────────────────────
renderCircles();
</script>
